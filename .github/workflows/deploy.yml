name: Camera Detection with Self-Hosted Runner

on:
  workflow_dispatch:  # រត់ដោយដៃតែប៉ុណ្ណោះ
  schedule:
    - cron: '0 */6 * * *'  # រត់រៀងរាល់ 6 ម៉ោង

jobs:
  detect:
    runs-on: self-hosted  # ប្រើកុំព្យូទ័រផ្ទាល់ខ្លួនដែលមាន camera
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run detection with camera
      run: |
        python -c "
        import cv2
        from ultralytics import YOLO
        import time
        
        # Load model
        model = YOLO('yolov8n.pt')
        
        # Open camera
        cap = cv2.VideoCapture(0)
        if not cap.isOpened():
            print('❌ Cannot open camera')
            exit(1)
        
        # Capture one frame
        ret, frame = cap.read()
        if ret:
            # Run detection
            results = model(frame)
            
            # Print results
            if results[0].boxes:
                print(f'✅ Detected {len(results[0].boxes)} objects:')
                for box in results[0].boxes:
                    class_id = int(box.cls[0])
                    confidence = float(box.conf[0])
                    class_name = model.names[class_id]
                    print(f'   - {class_name}: {confidence:.2f}')
            else:
                print('⚠️ No objects detected')
        else:
            print('❌ Failed to capture frame')
        
        cap.release()
        "
    
    - name: Save detection results
      run: |
        echo "Detection completed at $(date)" >> detection_log.txt
        echo "Runner: ${{ runner.name }}" >> detection_log.txt
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: detection-results
        path: detection_log.txt