<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLOv8n Camera Detection - Live Results</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 YOLOv8n Camera Detection</h1>
            <p>Real-time object detection with live results</p>
        </header>

        <div class="controls">
            <button id="startBtn" class="btn btn-start">▶ Start Camera</button>
            <button id="stopBtn" class="btn btn-stop" disabled>⏹ Stop Camera</button>
            <div id="modelInfo" class="model-info"></div>
        </div>

        <div class="main-content">
            <div class="video-section">
                <div class="video-container">
                    <img id="videoFeed" src="" alt="Camera Feed">
                    <div id="status" class="status"></div>
                </div>
            </div>

            <div class="results-section">
                <div class="results-header">
                    <h3>📊 Detection Results</h3>
                    <button id="refreshBtn" class="btn-refresh">🔄 Refresh</button>
                </div>
                
                <div id="liveResults" class="live-results">
                    <div class="loading">Waiting for camera...</div>
                </div>

                <div class="statistics">
                    <h4>📈 Statistics</h4>
                    <div id="statistics" class="stats-content">
                        <p>No data yet</p>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Powered by YOLOv8n | Real-time Object Detection</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
