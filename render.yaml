services:
  - type: web
    name: yolo8n-api
    runtime: python
    repo: https://github.com/cheat870/camera_setection
    branch: main
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn yolo_api:app --timeout 120 --workers 1
